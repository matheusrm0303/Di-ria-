<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1d4ed8">
<title>Controle de Diárias</title>

<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830284.png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eef4fb;
}

/* TOPO */
.topo {
  background: linear-gradient(135deg,#0f172a,#1d4ed8);
  color:white;
  padding:20px;
}

.topo h1 {margin:0;font-size:22px}

/* ABAS */
.tabs {
  display:flex;
  background:white;
  border-bottom:1px solid #ddd;
}

.tab {
  flex:1;
  text-align:center;
  padding:14px;
  font-weight:bold;
  cursor:pointer;
  color:#64748b;
}

.tab.active {
  color:#1d4ed8;
  border-bottom:3px solid #1d4ed8;
}

/* CONTEÚDO */
.section {display:none;padding:16px}
.section.active {display:block;animation:fade 0.3s}

@keyframes fade {
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}

/* CARDS */
.card {
  background:white;
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  animation:fade 0.3s;
}

/* INPUTS */
input,select {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* BOTÕES */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#1d4ed8;
  color:white;
  font-weight:bold;
}

/* BADGES */
.badge {
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.pago {background:#dcfce7;color:#166534}
.pendente {background:#fef3c7;color:#92400e}

/* LISTA */
.item {
  background:#f8fafc;
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
}

/* ÍCONES */
.icon {
  margin-right:6px;
}

</style>
</head>

<body>

<div class="topo">
  <h1>💼 Controle de Diárias</h1>
</div>

<div class="tabs">
  <div class="tab active" onclick="trocarTab('diaria')">💰 Diárias</div>
  <div class="tab" onclick="trocarTab('adiantamento')">💸 Adiantamentos</div>
  <div class="tab" onclick="trocarTab('resumo')">📊 Resumo</div>
</div>

<!-- DIÁRIAS -->
<div id="diaria" class="section active">

  <div class="card">
    <h3>➕ Nova diária</h3>

    <input type="date" id="dataDiaria">
    <input type="text" id="descDiaria" placeholder="Serviço">

    <select id="tipoDiaria">
      <option value="rua">Diária de rua (200)</option>
      <option value="deposito">Depósito (100)</option>
    </select>

    <select id="tipoCalc">
      <option value="normal">Normal</option>
      <option value="dobra">Dobra</option>
    </select>

    <select id="status">
      <option value="pendente">Pendente</option>
      <option value="pago">Pago</option>
    </select>

    <button onclick="addDiaria()">Adicionar</button>
  </div>

  <div id="listaDiaria"></div>

</div>

<!-- ADIANTAMENTO -->
<div id="adiantamento" class="section">

  <div class="card">
    <h3>💸 Novo adiantamento</h3>

    <input type="date" id="dataAd">
    <input type="text" id="descAd">
    <input type="number" id="valorAd">

    <button onclick="addAdiantamento()">Adicionar</button>
  </div>

  <div id="listaAd"></div>

</div>

<!-- RESUMO -->
<div id="resumo" class="section">

  <div class="card">
    <h3>📊 Resumo</h3>

    <p>Total diárias: <strong id="tDiaria">0</strong></p>
    <p>Adiantamentos: <strong id="tAd">0</strong></p>
    <p>Líquido: <strong id="tLiquido">0</strong></p>

  </div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("app")) || []

function salvar(){
  localStorage.setItem("app",JSON.stringify(dados))
}

function trocarTab(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

  document.getElementById(id).classList.add("active")
  event.target.classList.add("active")
}

function calcValor(tipo,calc){
  let base = tipo=="rua"?200:100
  return calc=="dobra"?base*2:base
}

function addDiaria(){
  let obj={
    tipo:"diaria",
    data:dataDiaria.value,
    desc:descDiaria.value,
    valor:calcValor(tipoDiaria.value,tipoCalc.value),
    status:status.value
  }
  dados.unshift(obj)
  salvar()
  render()
}

function addAdiantamento(){
  let obj={
    tipo:"adiantamento",
    data:dataAd.value,
    desc:descAd.value,
    valor:Number(valorAd.value)
  }
  dados.unshift(obj)
  salvar()
  render()
}

function render(){

  let d = dados.filter(i=>i.tipo=="diaria")
  let a = dados.filter(i=>i.tipo=="adiantamento")

  listaDiaria.innerHTML = d.map(i=>`
    <div class="item">
      <strong>${i.desc}</strong><br>
      ${i.data}<br>
      R$ ${i.valor}
      <span class="badge ${i.status}">${i.status}</span>
    </div>
  `).join("")

  listaAd.innerHTML = a.map(i=>`
    <div class="item">
      💸 ${i.desc}<br>
      R$ ${i.valor}
    </div>
  `).join("")

  let td = d.reduce((s,i)=>s+i.valor,0)
  let ta = a.reduce((s,i)=>s+i.valor,0)

  tDiaria.innerText = td
  tAd.innerText = ta
  tLiquido.innerText = td-ta
}

render()

</script>

</body>
</html>
