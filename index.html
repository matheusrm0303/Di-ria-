<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Controle de Diárias</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f3f4f6;
      color: #111827;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: #f9fafb;
      padding-bottom: 100px;
    }

    .topo {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      padding: 24px 18px 20px;
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
    }

    .topo h1 {
      margin: 0;
      font-size: 24px;
    }

    .topo p {
      margin: 8px 0 0;
      opacity: 0.95;
      font-size: 14px;
    }

    .conteudo {
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      margin-bottom: 14px;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #374151;
    }

    input, select {
      width: 100%;
      padding: 13px 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      background: #fff;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-principal {
      width: 100%;
      background: #2563eb;
      color: white;
      margin-top: 8px;
    }

    .btn-principal:active {
      transform: scale(0.98);
    }

    .resumo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .caixa-resumo {
      background: #eff6ff;
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }

    .caixa-resumo span {
      display: block;
      font-size: 12px;
      color: #374151;
      margin-bottom: 6px;
    }

    .caixa-resumo strong {
      font-size: 18px;
      color: #1d4ed8;
    }

    .lista {
      display: grid;
      gap: 10px;
    }

    .item {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 12px;
    }

    .item-topo {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .item-data {
      font-weight: bold;
      font-size: 15px;
    }

    .status {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }

    .pendente {
      background: #fef3c7;
      color: #92400e;
    }

    .pago {
      background: #dcfce7;
      color: #166534;
    }

    .item-info {
      font-size: 14px;
      color: #374151;
      margin: 4px 0;
    }

    .item-valor {
      font-size: 18px;
      font-weight: bold;
      color: #111827;
      margin-top: 8px;
    }

    .acoes {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .acoes button {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      border-radius: 10px;
    }

    .btn-pagar {
      background: #16a34a;
      color: white;
    }

    .btn-excluir {
      background: #dc2626;
      color: white;
    }

    .vazio {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      padding: 10px 0;
    }

    .rodape {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      padding: 10px 16px 24px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topo">
      <h1>Controle de Diárias</h1>
      <p>Gerencie seus lançamentos direto do celular</p>
    </div>

    <div class="conteudo">
      <div class="card">
        <h2>Novo lançamento</h2>
        <div class="grid">
          <div>
            <label>Data</label>
            <input type="date" id="data" />
          </div>

          <div>
            <label>Valor da diária (R$)</label>
            <input type="number" id="valor" placeholder="Ex: 150" step="0.01" />
          </div>

          <div>
            <label>Tipo</label>
            <select id="tipo">
              <option value="normal">Normal</option>
              <option value="dobra">Dobra</option>
            </select>
          </div>

          <div>
            <label>Status</label>
            <select id="status">
              <option value="pendente">Pendente</option>
              <option value="pago">Pago</option>
            </select>
          </div>
        </div>

        <button class="btn-principal" onclick="adicionarLancamento()">Adicionar</button>
      </div>

      <div class="card">
        <h2>Resumo do mês</h2>
        <div class="resumo">
          <div class="caixa-resumo">
            <span>Total do mês</span>
            <strong id="totalMes">R$ 0,00</strong>
          </div>
          <div class="caixa-resumo">
            <span>Total pago</span>
            <strong id="totalPago">R$ 0,00</strong>
          </div>
          <div class="caixa-resumo">
            <span>Total pendente</span>
            <strong id="totalPendente">R$ 0,00</strong>
          </div>
          <div class="caixa-resumo">
            <span>Quantidade</span>
            <strong id="quantidade">0</strong>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Lançamentos</h2>
        <div id="lista" class="lista"></div>
      </div>
    </div>

    <div class="rodape">
      Site em estilo aplicativo • funciona no navegador do celular
    </div>
  </div>

  <script>
    const STORAGE_KEY = "controle_diarias_mobile";

    function formatarMoeda(valor) {
      return Number(valor).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function formatarData(data) {
      if (!data) return "-";
      const [ano, mes, dia] = data.split("-");
      return `${dia}/${mes}/${ano}`;
    }

    function carregarLancamentos() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    }

    function salvarLancamentos(lista) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lista));
    }

    function adicionarLancamento() {
      const data = document.getElementById("data").value;
      const valor = parseFloat(document.getElementById("valor").value || "0");
      const tipo = document.getElementById("tipo").value;
      const status = document.getElementById("status").value;

      if (!data || !valor) {
        alert("Preencha a data e o valor.");
        return;
      }

      const valorFinal = tipo === "dobra" ? valor * 2 : valor;

      const lista = carregarLancamentos();
      lista.unshift({
        id: Date.now(),
        data,
        valorBase: valor,
        valorFinal,
        tipo,
        status
      });

      salvarLancamentos(lista);

      document.getElementById("data").value = "";
      document.getElementById("valor").value = "";
      document.getElementById("tipo").value = "normal";
      document.getElementById("status").value = "pendente";

      renderizar();
    }

    function excluirLancamento(id) {
      const lista = carregarLancamentos().filter(item => item.id !== id);
      salvarLancamentos(lista);
      renderizar();
    }

    function marcarComoPago(id) {
      const lista = carregarLancamentos().map(item => {
        if (item.id === id) {
          item.status = "pago";
        }
        return item;
      });
      salvarLancamentos(lista);
      renderizar();
    }

    function renderizar() {
      const lista = carregarLancamentos();
      const container = document.getElementById("lista");

      if (lista.length === 0) {
        container.innerHTML = '<div class="vazio">Nenhum lançamento ainda.</div>';
      } else {
        container.innerHTML = lista.map(item => `
          <div class="item">
            <div class="item-topo">
              <div class="item-data">${formatarData(item.data)}</div>
              <div class="status ${item.status === "pago" ? "pago" : "pendente"}">
                ${item.status === "pago" ? "Pago" : "Pendente"}
              </div>
            </div>

            <div class="item-info">Tipo: ${item.tipo === "dobra" ? "Dobra" : "Normal"}</div>
            <div class="item-info">Valor base: ${formatarMoeda(item.valorBase)}</div>
            <div class="item-valor">${formatarMoeda(item.valorFinal)}</div>

            <div class="acoes">
              ${item.status !== "pago"
                ? `<button class="btn-pagar" onclick="marcarComoPago(${item.id})">Marcar como pago</button>`
                : ""
              }
              <button class="btn-excluir" onclick="excluirLancamento(${item.id})">Excluir</button>
            </div>
          </div>
        `).join("");
      }

      const totalMes = lista.reduce((soma, item) => soma + Number(item.valorFinal), 0);
      const totalPago = lista
        .filter(item => item.status === "pago")
        .reduce((soma, item) => soma + Number(item.valorFinal), 0);
      const totalPendente = lista
        .filter(item => item.status === "pendente")
        .reduce((soma, item) => soma + Number(item.valorFinal), 0);

      document.getElementById("totalMes").textContent = formatarMoeda(totalMes);
      document.getElementById("totalPago").textContent = formatarMoeda(totalPago);
      document.getElementById("totalPendente").textContent = formatarMoeda(totalPendente);
      document.getElementById("quantidade").textContent = lista.length;
    }

    renderizar();
  </script>
</body>
</html>
