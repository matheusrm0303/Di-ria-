<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Diárias</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

.topo {
  background:#1d4ed8;
  padding:15px;
}

.tabs {
  display:flex;
}

.tab {
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
  color:#94a3b8;
}

.tab.active {
  color:white;
  border-bottom:3px solid #3b82f6;
}

.section {display:none;padding:15px}
.section.active {display:block}

.card {
  background:#111827;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

input,select {
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

.item {
  background:#1e293b;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
}
</style>
</head>

<body>

<div class="topo">
  <h3>💼 Controle de Diárias</h3>
</div>

<div class="tabs">
  <div class="tab active" onclick="trocarTab('diaria',this)">💰</div>
  <div class="tab" onclick="trocarTab('adiantamento',this)">💸</div>
  <div class="tab" onclick="trocarTab('resumo',this)">📊</div>
</div>

<!-- DIARIA -->
<div id="diaria" class="section active">

<div class="card">
<input type="date" id="dataDiaria">
<input type="text" id="descDiaria" placeholder="Serviço">

<select id="tipoDiaria">
<option value="rua">Rua (200)</option>
<option value="deposito">Depósito (100)</option>
</select>

<select id="tipoCalc">
<option value="normal">Normal</option>
<option value="dobra">Dobra</option>
</select>

<select id="status">
<option value="pendente">Pendente</option>
<option value="pago">Pago</option>
</select>

<button onclick="addDiaria()">Adicionar</button>
</div>

<div id="listaDiaria"></div>

</div>

<!-- ADIANTAMENTO -->
<div id="adiantamento" class="section">

<div class="card">
<input type="date" id="dataAd">
<input type="text" id="descAd">
<input type="number" id="valorAd">

<button onclick="addAdiantamento()">Adicionar</button>
</div>

<div id="listaAd"></div>

</div>

<!-- RESUMO -->
<div id="resumo" class="section">

<div class="card">
<input type="month" id="mes">
<button onclick="gerarPDF()">Gerar PDF</button>

<p>Total diárias: <strong id="tDiaria">0</strong></p>
<p>Adiantamentos: <strong id="tAd">0</strong></p>
<p>Líquido: <strong id="tLiquido">0</strong></p>
</div>

<div id="listaResumo"></div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("app")) || []

function salvar(){
  localStorage.setItem("app",JSON.stringify(dados))
}

function trocarTab(id,el){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

  document.getElementById(id).classList.add("active")
  el.classList.add("active")
}

function calcValor(tipo,calc){
  let base = tipo=="rua"?200:100
  return calc=="dobra"?base*2:base
}

function addDiaria(){

  let data = document.getElementById("dataDiaria").value
  let desc = document.getElementById("descDiaria").value
  let tipo = document.getElementById("tipoDiaria").value
  let calc = document.getElementById("tipoCalc").value
  let status = document.getElementById("status").value

  if(!data || !desc){
    alert("Preencha tudo")
    return
  }

  dados.unshift({
    tipo:"diaria",
    data:data,
    desc:desc,
    valor:calcValor(tipo,calc),
    status:status
  })

  salvar()
  render()
}

function addAdiantamento(){

  let data = document.getElementById("dataAd").value
  let desc = document.getElementById("descAd").value
  let valor = document.getElementById("valorAd").value

  if(!data || !desc || !valor){
    alert("Preencha tudo")
    return
  }

  dados.unshift({
    tipo:"adiantamento",
    data:data,
    desc:desc,
    valor:Number(valor)
  })

  salvar()
  render()
}

function excluir(index){
  dados.splice(index,1)
  salvar()
  render()
}

function render(){

  let listaDiaria = document.getElementById("listaDiaria")
  let listaAd = document.getElementById("listaAd")

  let d = dados.filter(i=>i.tipo=="diaria")
  let a = dados.filter(i=>i.tipo=="adiantamento")

  listaDiaria.innerHTML = d.map((i,index)=>`
    <div class="item">
      ${i.data} - ${i.desc} - R$ ${i.valor}
      <button onclick="excluir(${index})">Excluir</button>
    </div>
  `).join("")

  listaAd.innerHTML = a.map((i,index)=>`
    <div class="item">
      ${i.data} - ${i.desc} - R$ ${i.valor}
      <button onclick="excluir(${index})">Excluir</button>
    </div>
  `).join("")

  atualizarResumo()
}

function atualizarResumo(){

  let mes = document.getElementById("mes").value
  let listaResumo = document.getElementById("listaResumo")

  let lista = dados.filter(i=>{
    if(!mes) return true
    return i.data.startsWith(mes)
  })

  let d = lista.filter(i=>i.tipo=="diaria")
  let a = lista.filter(i=>i.tipo=="adiantamento")

  let td = d.reduce((s,i)=>s+i.valor,0)
  let ta = a.reduce((s,i)=>s+i.valor,0)

  document.getElementById("tDiaria").innerText = td
  document.getElementById("tAd").innerText = ta
  document.getElementById("tLiquido").innerText = td-ta

  listaResumo.innerHTML = lista.map(i=>`
    <div class="item">
      ${i.data} - ${i.desc} - R$ ${i.valor}
    </div>
  `).join("")
}

function gerarPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let mes = document.getElementById("mes").value

  let lista = dados.filter(i=>{
    if(!mes) return true
    return i.data.startsWith(mes)
  })

  let y = 10

  doc.text("Resumo",10,y)
  y+=10

  lista.forEach(i=>{
    doc.text(`${i.data} - ${i.desc} - R$ ${i.valor}`,10,y)
    y+=8
  })

  doc.save("resumo.pdf")
}

document.getElementById("mes").addEventListener("change",atualizarResumo)

render()

</script>

</body>
</html>
