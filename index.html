<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Profissional</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body{margin:0;background:#020617;color:#fff;font-family:Arial}
.app{max-width:500px;margin:auto;padding:15px}
.topo{font-size:22px;font-weight:bold;margin-bottom:15px}

.tabs{display:flex;margin-bottom:10px}
.tab{flex:1;padding:10px;text-align:center;background:#111827;margin:2px;border-radius:8px;color:#94a3b8}
.tab.active{background:#2563eb;color:#fff}

.card{background:#111827;padding:12px;border-radius:12px;margin-bottom:10px}

input,select{width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:none;background:#1e293b;color:#fff}

button{padding:10px;border:none;border-radius:8px;margin-top:5px}
.btn{background:#2563eb;color:#fff;width:100%}
.btn2{background:#16a34a;color:#fff}
.btn3{background:#dc2626;color:#fff}

.item{background:#1e293b;padding:10px;border-radius:10px;margin-bottom:8px}

</style>
</head>

<body>
<div class="app">

<div class="topo">💼 Controle Profissional</div>

<div class="tabs">
<div class="tab active" onclick="tab('d',this)">Diárias</div>
<div class="tab" onclick="tab('a',this)">Adiant.</div>
<div class="tab" onclick="tab('r',this)">Resumo</div>
</div>

<div id="d">
<div class="card">
<input type="date" id="data">
<input type="text" id="desc" placeholder="Serviço">
<select id="tipo">
<option value="rua">Rua 200</option>
<option value="dep">Depósito 100</option>
</select>
<select id="calc">
<option value="n">Normal</option>
<option value="d">Dobra</option>
</select>
<select id="status">
<option value="pendente">Pendente</option>
<option value="pago">Pago</option>
</select>

<button class="btn" onclick="add()">Adicionar</button>
</div>

<div id="lista"></div>
</div>

<div id="a" style="display:none">
<div class="card">
<input type="date" id="dataA">
<input type="text" id="descA">
<input type="number" id="valA">

<button class="btn" onclick="addA()">Adicionar</button>
</div>

<div id="listaA"></div>
</div>

<div id="r" style="display:none">
<div class="card">
<input type="month" id="mes">
<button class="btn2" onclick="mesAtual()">Mês atual</button>
<button class="btn" onclick="pdf()">Gerar PDF</button>

<p>Total: <span id="t"></span></p>
<p>Adiant.: <span id="ta"></span></p>
<p>Líquido: <span id="tl"></span></p>
</div>

<div id="listaR"></div>
</div>

</div>
