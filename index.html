<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle Profissional</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body{margin:0;background:#020617;color:#fff;font-family:Arial}
.app{max-width:500px;margin:auto;padding:15px}
.topo{display:flex;justify-content:space-between;align-items:center}
button{padding:10px;border:none;border-radius:10px;cursor:pointer}
input,select{width:100%;padding:10px;margin-top:5px;border-radius:10px;border:1px solid #333;background:#111;color:#fff}
.card{background:#111;padding:15px;border-radius:15px;margin-bottom:10px}
.lista{display:grid;gap:10px}
.item{background:#1e293b;padding:10px;border-radius:10px}
</style>

</head>
<body>

<div id="login">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<button onclick="criar()">Criar conta</button>
<p id="msg"></p>
</div>

<div class="app" id="app" style="display:none">

<div class="topo">
<h2>💼 Controle</h2>
<button onclick="logout()">Sair</button>
</div>

<div class="card">
<h3>Nova diária</h3>
<input type="date" id="data">
<input placeholder="Descrição" id="desc">

<select id="tipo">
<option value="rua">Rua 200</option>
<option value="deposito">Depósito 100</option>
</select>

<select id="mult">
<option value="1">Normal</option>
<option value="2">Dobra</option>
</select>

<button onclick="addDiaria()">Adicionar</button>
</div>

<div class="card">
<h3>Adiantamento</h3>
<input type="date" id="dataAd">
<input placeholder="Descrição" id="descAd">
<input type="number" id="valorAd">
<button onclick="addAd()">Adicionar</button>
</div>

<div class="card">
<h3>Lista</h3>
<div id="lista" class="lista"></div>
</div>

<div class="card">
<button onclick="gerarPDF()">Gerar PDF</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAYcIFdxFPJyVl2im8Zyps5MGF7pupe_NI",
authDomain: "controle-diarias-4627b.firebaseapp.com",
projectId: "controle-diarias-4627b",
storageBucket: "controle-diarias-4627b.firebasestorage.app",
messagingSenderId: "432274053982",
appId: "1:432274053982:web:31a14aeb0e4f4517e40dcf"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user;
let listaLocal=[];

onAuthStateChanged(auth, async (u)=>{
if(u){
user=u;
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
carregar();
}else{
document.getElementById("login").style.display="block";
document.getElementById("app").style.display="none";
}
});

window.login=async ()=>{
try{
await signInWithEmailAndPassword(auth,email.value,senha.value);
}catch(e){
msg.innerText=e.message;
}
}

window.criar=async ()=>{
try{
await createUserWithEmailAndPassword(auth,email.value,senha.value);
}catch(e){
msg.innerText=e.message;
}
}

window.logout=()=>signOut(auth);

function ref(){
return collection(db,"users",user.uid,"dados");
}

async function addDiaria(){
const base = tipo.value==="rua"?200:100;
const valor = base*Number(mult.value);

await addDoc(ref(),{
tipo:"diaria",
data:data.value,
desc:desc.value,
valor
});

carregar();
}

async function addAd(){
await addDoc(ref(),{
tipo:"adiantamento",
data:dataAd.value,
desc:descAd.value,
valor:Number(valorAd.value)
});
carregar();
}

async function del(id){
await deleteDoc(doc(db,"users",user.uid,"dados",id));
carregar();
}

async function carregar(){
const q=await getDocs(ref());
listaLocal=[];
q.forEach(doc=>{
listaLocal.push({id:doc.id,...doc.data()});
});
render();
}

function render(){
lista.innerHTML = listaLocal.map(i=>`
<div class="item">
<b>${i.desc}</b><br>
${i.data}<br>
R$ ${i.valor}
<br>
<button onclick="del('${i.id}')">Excluir</button>
</div>
`).join("");
}

window.del=del;

function gerarPDF(){
const { jsPDF } = window.jspdf;
const doc=new jsPDF();

let y=10;
doc.text("Relatório",10,y);
y+=10;

listaLocal.forEach(i=>{
doc.text(`${i.data} - ${i.desc} - R$ ${i.valor}`,10,y);
y+=8;
});

doc.save("relatorio.pdf");
}

</script>

</body>
</html>
