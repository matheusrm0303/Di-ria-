<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#020617">
<title>Controle de Diárias</title>

<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2830/2830284.png">

<style>
* {
  box-sizing: border-box;
  font-family: Arial;
}

:root {
  --bg:#020617;
  --card:#0f172a;
  --text:#f8fafc;
  --muted:#94a3b8;
  --blue:#3b82f6;
  --green:#22c55e;
  --yellow:#f59e0b;
  --red:#ef4444;
}

body {
  margin:0;
  background:linear-gradient(#020617,#020617);
  color:var(--text);
}

/* TOPO */
.topo {
  background:linear-gradient(135deg,#020617,#1d4ed8);
  padding:20px;
}

.topo h1 {margin:0}

/* ABAS */
.tabs {
  display:flex;
  background:#020617;
}

.tab {
  flex:1;
  text-align:center;
  padding:14px;
  cursor:pointer;
  color:var(--muted);
}

.tab.active {
  color:white;
  border-bottom:3px solid var(--blue);
}

/* SEÇÕES */
.section {display:none;padding:16px}
.section.active {display:block}

/* CARDS */
.card {
  background:var(--card);
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}

/* INPUT */
input,select {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  background:#1e293b;
  color:white;
}

/* BOTÃO */
button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--blue);
  color:white;
}

/* LISTA */
.item {
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

/* BADGE */
.badge {
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
}

.pago {background:#16a34a}
.pendente {background:#f59e0b}

/* RESUMO */
.resumo p {
  margin:6px 0;
}

</style>
</head>

<body>

<div class="topo">
  <h1>💼 Controle de Diárias</h1>
</div>

<div class="tabs">
  <div class="tab active" onclick="trocarTab('diaria',this)">💰</div>
  <div class="tab" onclick="trocarTab('adiantamento',this)">💸</div>
  <div class="tab" onclick="trocarTab('resumo',this)">📊</div>
</div>

<!-- DIARIA -->
<div id="diaria" class="section active">

<div class="card">
<h3>Nova diária</h3>

<input type="date" id="dataDiaria">
<input type="text" id="descDiaria" placeholder="Serviço">

<select id="tipoDiaria">
<option value="rua">Rua (200)</option>
<option value="deposito">Depósito (100)</option>
</select>

<select id="tipoCalc">
<option value="normal">Normal</option>
<option value="dobra">Dobra</option>
</select>

<select id="status">
<option value="pendente">Pendente</option>
<option value="pago">Pago</option>
</select>

<button onclick="addDiaria()">Adicionar</button>
</div>

<div id="listaDiaria"></div>

</div>

<!-- ADIANTAMENTO -->
<div id="adiantamento" class="section">

<div class="card">
<h3>Adiantamento</h3>

<input type="date" id="dataAd">
<input type="text" id="descAd">
<input type="number" id="valorAd">

<button onclick="addAdiantamento()">Adicionar</button>
</div>

<div id="listaAd"></div>

</div>

<!-- RESUMO -->
<div id="resumo" class="section">

<div class="card resumo">
<h3>Resumo</h3>

<p>Total diárias: <strong id="tDiaria">0</strong></p>
<p>Adiantamentos: <strong id="tAd">0</strong></p>
<p>Líquido: <strong id="tLiquido">0</strong></p>

</div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("app")) || []

function salvar(){
  localStorage.setItem("app",JSON.stringify(dados))
}

function trocarTab(id,el){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

  document.getElementById(id).classList.add("active")
  el.classList.add("active")
}

function calcValor(tipo,calc){
  let base = tipo=="rua"?200:100
  return calc=="dobra"?base*2:base
}

function addDiaria(){

  if(!dataDiaria.value || !descDiaria.value){
    alert("Preencha tudo")
    return
  }

  dados.unshift({
    tipo:"diaria",
    data:dataDiaria.value,
    desc:descDiaria.value,
    valor:calcValor(tipoDiaria.value,tipoCalc.value),
    status:status.value
  })

  salvar()
  render()
}

function addAdiantamento(){

  if(!dataAd.value || !descAd.value || !valorAd.value){
    alert("Preencha tudo")
    return
  }

  dados.unshift({
    tipo:"adiantamento",
    data:dataAd.value,
    desc:descAd.value,
    valor:Number(valorAd.value)
  })

  salvar()
  render()
}

function render(){

  let d = dados.filter(i=>i.tipo=="diaria")
  let a = dados.filter(i=>i.tipo=="adiantamento")

  listaDiaria.innerHTML = d.map(i=>`
    <div class="item">
      <strong>${i.desc}</strong><br>
      ${i.data}<br>
      R$ ${i.valor}
      <span class="badge ${i.status}">${i.status}</span>
    </div>
  `).join("")

  listaAd.innerHTML = a.map(i=>`
    <div class="item">
      💸 ${i.desc}<br>
      R$ ${i.valor}
    </div>
  `).join("")

  let td = d.reduce((s,i)=>s+i.valor,0)
  let ta = a.reduce((s,i)=>s+i.valor,0)

  tDiaria.innerText = td
  tAd.innerText = ta
  tLiquido.innerText = td-ta
}

render()

</script>

</body>
</html>
